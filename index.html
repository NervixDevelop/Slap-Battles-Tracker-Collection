<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slap Battles Tracker by Nervix</title>
    <style>
        :root {
            --bg-color: #0c0a09; --card-bg: #1c1917; --text-main: #f5f5f4; --text-muted: #a8a29e;
            --accent: #eab308; --success: #22c55e; --modal-bg: rgba(12, 10, 9, 0.95); --border-color: #292524;
            --card-width: 170px;
        }
        /* ТЕМЫ */
        body.theme-light { --bg-color: #f5f5f4; --card-bg: #ffffff; --text-main: #1c1917; --text-muted: #78716c; --accent: #d97706; --modal-bg: rgba(245, 245, 244, 0.95); --border-color: #d6d3d1; }
        body.theme-blue { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #38bdf8; --text-muted: #94a3b8; --accent: #0ea5e9; --modal-bg: rgba(15, 23, 42, 0.95); --border-color: #334155; }
        body.theme-crimson { --bg-color: #1a0505; --card-bg: #2d0a0a; --text-main: #fca5a5; --text-muted: #f87171; --accent: #ef4444; --success: #ef4444; --modal-bg: rgba(26, 5, 5, 0.95); --border-color: #450a0a; }
        body.theme-matrix { --bg-color: #051a05; --card-bg: #0a2d0a; --text-main: #86efac; --text-muted: #4ade80; --accent: #22c55e; --success: #22c55e; --modal-bg: rgba(5, 26, 5, 0.95); --border-color: #052e16; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px; padding-bottom: 40px; max-width: 900px; margin: 0 auto; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ШАПКА */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .app-title { font-size: 20px; font-weight: 900; background: linear-gradient(to right, #eab308, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 1px;}
        .app-subtitle { font-size: 12px; color: var(--text-muted); }
        
        .top-right { display: flex; align-items: center; gap: 15px; }
        .btn-achiev-top { background: var(--card-bg); border: 2px solid var(--accent); color: var(--text-main); font-size: 18px; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn-achiev-top:hover { transform: scale(1.05); background: var(--accent); color: #000; }
        .btn-achiev-top:active { transform: scale(0.95); }

        .top-profile-area { display: flex; align-items: center; gap: 10px; cursor: pointer; text-align: right; transition: transform 0.2s; }
        .top-profile-area:hover { transform: scale(1.02); }
        .top-profile-info { display: flex; flex-direction: column; justify-content: center; }
        .top-nickname { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .top-stats { font-size: 12px; font-weight: bold; color: var(--accent); margin-top: 2px; }
        .top-title { font-size: 10px; font-weight: 900; margin-top: 2px; text-transform: uppercase; color: var(--accent); }
        
        .profile-trigger { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; background: var(--card-bg); border: 2px solid var(--accent); flex-shrink: 0; }
        .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

        /* ПОИСК И ПОЛЗУНОК */
        .controls-container { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .search-input { flex: 1; padding: 12px 15px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(234, 179, 8, 0.2); }
        .slider-container { display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 10px; height: 43px; width: 100px; }
        .grid-slider { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .type-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .type-btn { flex: 1; min-width: 110px; padding: 10px 5px; text-align: center; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; color: var(--text-muted); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .type-btn:hover { background: rgba(255,255,255,0.05); }
        .type-btn.active { background: var(--accent); color: #000; border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* СЕТКА И КАРТОЧКИ ВИКИ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-width), 1fr)); gap: 12px; width: 100%; }
        .sb-card { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease; animation: fadeIn 0.4s ease-out backwards; }
        .sb-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .sb-card:active { transform: scale(0.96); }
        .sb-card.collected { border-color: var(--success) !important; background: rgba(34, 197, 94, 0.05); }
        .sb-card.collected .sb-header { border-bottom-color: var(--success) !important; }

        .sb-header { background: rgba(0,0,0,0.3); color: var(--text-main); text-align: center; font-weight: 900; font-size: 16px; padding: 10px 5px; border-bottom: 2px solid var(--border-color); transition: border-color 0.3s; }
        .sb-body { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-grow: 1; justify-content: space-between; }
        
        .sb-type-badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-Slap { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .type-Badge { background: rgba(168, 85, 247, 0.2); color: #a855f7; border: 1px solid #a855f7; }
        .type-Event { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .type-Gamepass { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid #eab308; }
        
        .sb-desc { font-size: 10px; color: var(--text-muted); text-align: center; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .sb-price-box { display: flex; width: 100%; background: rgba(0,0,0,0.4); border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); margin-top: 5px; }
        .sb-price-col { flex: 1; text-align: center; padding: 6px 2px; font-weight: 800; font-size: 12px; }
        .sb-price-slaps { color: #facc15; } /* Золотой для шлепков */
        .sb-price-robux { color: #22c55e; } /* Зеленый для робуксов */

        /* МОДАЛКИ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-color); width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; border: 1px solid var(--border-color); position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .close-btn { position: absolute; top: 16px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .close-btn:hover { color: var(--text-main); transform: rotate(90deg); }
        .modal-title { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 15px; color: var(--text-main); }
        
        .btn { padding: 14px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; color: #fff; width: 100%; margin-top: 10px; display: block; text-decoration: none; text-align: center; transition: 0.2s;}
        .btn:active { transform: scale(0.97); }
        .btn-save { background: var(--success); color: #fff; }
        .btn-tg { background: #0088cc; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-boosty { background: linear-gradient(90deg, #f97316, #ef4444); display: flex; justify-content: center; align-items: center; gap: 8px;}
        
        .status-group { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .checkbox-label { display: flex; align-items: center; gap: 10px; font-size: 16px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        .checkbox-label input { width: 22px; height: 22px; accent-color: var(--success); cursor: pointer;}
        .input-field { width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; font-size: 14px; outline: none; margin-top: 5px; transition: 0.2s;}
        .input-field:focus { border-color: var(--accent); }

        .achievements-grid { display: grid; gap: 10px; margin-top: 10px; margin-bottom: 15px;}
        .achiev-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; opacity: 0.5; filter: grayscale(100%); transition: 0.3s; }
        .achiev-card.unlocked { opacity: 1; filter: none; border-color: var(--success); background: rgba(34, 197, 94, 0.05); }
        .achiev-icon { font-size: 28px; }
        .achiev-text h4 { font-size: 14px; color: var(--text-main); margin-bottom: 2px;}
        .achiev-text p { font-size: 11px; color: var(--text-muted); }

        .val-box { text-align: center; border: 1px solid var(--accent); background: rgba(234, 179, 8, 0.05); }
        .val-title { color: var(--accent); font-size: 13px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .val-slaps { font-size: 24px; font-weight: 900; color: #facc15; margin-bottom: 4px; }
    </style>
</head>
<body class="theme-dark">

    <header class="top-bar">

    <script>
        let audioCtx = null;
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.05);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.setValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

            { "id": "Replica (Master)", "mainType": "Slap", "reqEn": "Master Replica: cloning/copying enhanced" }
        ];

        // Ключи сохранения для Slap Battles (чтобы не пересекались с другими трекерами)
        const KEYS = { PRO: 'sb_pro_v1', DET: 'sb_det_v1' };
        let profile = JSON.parse(localStorage.getItem(KEYS.PRO)) || { name: 'Slapper', avatar: '', theme: 'theme-dark', title: 'tit_1' };
        let itemDetails = JSON.parse(localStorage.getItem(KEYS.DET)) || {};
        
        let currentFilter = 'Slap'; // Вкладка по умолчанию
        let currentEditingId = null;

        const ACHIEVEMENTS = [
            { id: 'a1', icon: '🖐️', title: 'Первый шлепок', desc: 'Собери 1 любую перчатку', chk: (s, v) => s.total >= 1, rew: 'tit_2' },
            { id: 'a2', icon: '🎖️', title: 'Охотник за бейджами', desc: 'Собери 10 перчаток за бейджи', chk: (s, v) => s.Badge >= 10, rew: 'tit_3' },
            { id: 'a3', icon: '💰', title: 'Спонсор', desc: 'Купи 2 донатные перчатки', chk: (s, v) => s.Gamepass >= 2, rew: 'tit_4' },
            { id: 'a4', icon: '👑', title: 'Богач', desc: 'Инвентарь на 5,000 шлепков', chk: (s, v) => v.slaps >= 5000, rew: 'tit_5' },
            { id: 'a5', icon: '🌌', title: 'Бог Шлепков', desc: 'Инвентарь на 50,000 шлепков', chk: (s, v) => v.slaps >= 50000, rew: 'tit_6' },
            { id: 'a6', icon: '💯', title: 'Коллекционер', desc: 'Собери 50 перчаток', chk: (s, v) => s.total >= 50, rew: 'tit_7' }
        ];

        const TITLES = {
            'tit_1': 'Новичок', 'tit_2': 'Боец', 'tit_3': 'Охотник', 
            'tit_4': 'Спонсор', 'tit_5': 'Магнат', 'tit_6': 'Бог Шлепков', 'tit_7': 'Легенда'
        };

        function getCategory(mainType) {
            if (mainType === 'Slap' || mainType === 'Starter') return 'Slap';
            if (mainType === 'Badge') return 'Badge';
            if (mainType === 'Event' || mainType === 'Limited') return 'Event';
            if (mainType === 'Gamepass' || mainType === 'VIP' || mainType === 'Cosmetic' || mainType === 'Admin') return 'Gamepass';
            return 'Slap';
        }

        function init() { applyProfile(); setCategory('Slap'); }

        function getStats() {
            let s = { total: 0, Slap: 0, Badge: 0, Event: 0, Gamepass: 0 };
            rawData.forEach(i => {
                if (itemDetails[i.id] && itemDetails[i.id].collected) {
                    s.total++;
                    s[getCategory(i.mainType)]++;
                }
            });
            return s;
        }

        function getCollectionValue() {
            let totalSlaps = 0;
            rawData.forEach(i => {
                if (itemDetails[i.id] && itemDetails[i.id].collected && i.slapsRequired) {
                    totalSlaps += parseInt(i.slapsRequired.replace(/,/g, '')) || 0;
                }
            });
            return { slaps: totalSlaps };
        }

        function updateTopStats() {
            const s = getStats();
            document.getElementById('display-stats').innerText = `Собрано: ${s.total}`;
        }

        function setCategory(cat) {
            playSound('click'); currentFilter = cat;
            ['Slap', 'Badge', 'Event', 'Gamepass'].forEach(id => {
                document.getElementById(`btn-${id}`).classList.toggle('active', id === cat);
            });
            document.getElementById('search-input').value = ''; renderItems(); updateTopStats();
        }

        function updateGridSize(val) { document.documentElement.style.setProperty('--card-width', val + 'px'); }

        function renderItems() {
            const grid = document.getElementById('items-grid'); grid.innerHTML = '';
            const search = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = rawData.filter(i => getCategory(i.mainType) === currentFilter);
            if (search) filtered = filtered.filter(i => i.id.toLowerCase().includes(search));

            filtered.forEach((item, index) => {
                const d = itemDetails[item.id] || {}; const card = document.createElement('div');
                card.style.animationDelay = `${(index % 20) * 0.02}s`;
                card.className = `sb-card ${d.collected ? 'collected' : ''}`;
                card.onclick = () => openItemModal(item.id);

                let badgeHtml = `<div class="sb-type-badge type-${currentFilter}">${item.mainType}</div>`;
                let priceHtml = '';
                
                if (item.slapsRequired) priceHtml = `<div class="sb-price-box"><div class="sb-price-col sb-price-slaps">👏 ${item.slapsRequired}</div></div>`;
                if (item.priceRobux && item.priceRobux !== "N/A") priceHtml = `<div class="sb-price-box"><div class="sb-price-col sb-price-robux">R$ ${item.priceRobux}</div></div>`;

                card.innerHTML = `
                    <div class="sb-header">${item.id}</div>
                    <div class="sb-body">
                        ${badgeHtml}
                        <div class="sb-desc">${item.reqEn || 'Секретная перчатка'}</div>
                        ${priceHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openItemModal(id) {
            playSound('click'); currentEditingId = id; const d = itemDetails[id] || {}; const item = rawData.find(i => i.id === id);
            document.getElementById('modal-name').innerText = item.id;
            document.getElementById('modal-type-badge').className = `sb-type-badge type-${getCategory(item.mainType)}`;
            document.getElementById('modal-type-badge').innerText = item.mainType;
            
            document.getElementById('modal-req-text').innerText = item.reqEn || 'Подсказки пока нет.';
            
            let pBox = document.getElementById('modal-price-box');
            if(item.slapsRequired) pBox.innerHTML = `Требуется шлепков: 👏 ${item.slapsRequired}`;
            else if(item.priceRobux && item.priceRobux !== "N/A") pBox.innerHTML = `Цена: R$ ${item.priceRobux}`;
            else pBox.innerHTML = '';

            document.getElementById('mod-collected').checked = !!d.collected; 
            document.getElementById('mod-notes').value = d.notes || '';
            document.getElementById('item-modal').classList.add('active');
        }

        function saveItem() {
            if (!currentEditingId) return; const isColl = document.getElementById('mod-collected').checked; playSound(isColl ? 'success' : 'click');
            itemDetails[currentEditingId] = { collected: isColl, notes: document.getElementById('mod-notes').value };
            localStorage.setItem(KEYS.DET, JSON.stringify(itemDetails));
            updateTopStats(); closeModal('item-modal'); renderItems();
        }

        function populateTitlesSelect() {
            const select = document.getElementById('prof-title-select'); select.innerHTML = '';
            select.add(new Option(TITLES['tit_1'], 'tit_1'));
            const s = getStats(); const v = getCollectionValue();
            ACHIEVEMENTS.forEach(ach => { if (ach.chk(s, v)) { select.add(new Option(TITLES[ach.rew], ach.rew)); } });
            select.value = profile.title || 'tit_1';
        }

        function applyProfile() {
            document.getElementById('display-nickname').innerText = profile.name || 'Slapper';
            if (profile.avatar) document.getElementById('display-avatar').src = profile.avatar;
            document.body.className = profile.theme || 'theme-dark';
            document.getElementById('display-title').innerText = TITLES[profile.title || 'tit_1'];
            updateTopStats();
        }

        function openProfileModal() {
            playSound('click');
            document.getElementById('prof-name').value = profile.name || ''; 
            document.getElementById('prof-avatar').value = profile.avatar || '';
            document.getElementById('prof-theme').value = profile.theme || 'theme-dark';
            populateTitlesSelect();
            const v = getCollectionValue(); 
            document.getElementById('prof-val-slaps').innerText = v.slaps.toLocaleString('en-US');
            document.getElementById('profile-modal').classList.add('active');
        }

        function openAchievementsModal() {
            playSound('click'); const container = document.getElementById('full-achievements-container'); container.innerHTML = '';
            const s = getStats(); const v = getCollectionValue();
            ACHIEVEMENTS.forEach(ach => {
                const unlocked = ach.chk(s, v);
                container.innerHTML += `<div class="achiev-card ${unlocked ? 'unlocked' : ''}"><div class="achiev-icon">${ach.icon}</div><div class="achiev-text"><h4>${ach.title}</h4><p>${ach.desc}</p>${unlocked ? `<div style="color:var(--accent); font-size:10px; font-weight:bold; margin-top:4px;">Награда: ${TITLES[ach.rew]}</div>` : ''}</div></div>`;
            });
            document.getElementById('achievements-modal').classList.add('active');
        }

        function saveProfile() {
            playSound('click');
            profile = { name: document.getElementById('prof-name').value || 'Slapper', avatar: document.getElementById('prof-avatar').value, theme: document.getElementById('prof-theme').value, title: document.getElementById('prof-title-select').value };
            localStorage.setItem(KEYS.PRO, JSON.stringify(profile)); applyProfile(); closeModal('profile-modal');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); currentEditingId = null; }
        
        function exportData() {
            playSound('click'); const data = { profile: localStorage.getItem(KEYS.PRO), details: localStorage.getItem(KEYS.DET) };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'slap_battles_backup.json'; a.click(); URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = function(e) { try { const data = JSON.parse(e.target.result); if (data.profile) localStorage.setItem(KEYS.PRO, data.profile); if (data.details) localStorage.setItem(KEYS.DET, data.details); playSound('success'); location.reload(); } catch (err) { alert('Ошибка чтения файла бэкапа!'); } };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
